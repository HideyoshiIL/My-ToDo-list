<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyToDo list</title>
  <link rel="stylesheet" href="/style/font-awesome.min.css">
  <link rel="stylesheet" href="/style/style.css">
</head>
<body> 

  <div id="main">
    <div class="box"> 

      <div id="name">
        <h1>
          <i class="fa fa-check-square-o" aria-hidden="true"></i>
          To Do list
        </h1>
      </div>

      <div>
        <form action="" class="inp">
          <div>
            <input type="text" class="entry" placeholder="Что необхоимо сделать?">
            <button class="btn">Добавить задачу</button>
          </div>
          <div id="import">
            <span>Задача важная?</span>
            <input type="checkbox" class="add">
            <span class="yes">Да!</span>
            </div>
        </form>

        
      </div>

      <div class="inner">
        <ul class="list">

        </ul>
      </div>
    </div>
  </div>







  <script src="/js/script.js"></script>
</body>
</html>
